<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .header-text h1 { font-size: 14px; font-weight: 600; }
    .header-text p { font-size: 10px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 14px 16px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 500; margin-bottom: 4px; color: #555; }
    .field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #6366f1; }
    .btn {
      width: 100%;
      padding: 8px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .status-bar {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    .status-bar.success { display: block; background: #dcfce7; color: #166534; }
    .status-bar.error { display: block; background: #fef2f2; color: #991b1b; }
    .detected {
      margin-top: 10px;
      padding: 10px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    .detected .platform-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      color: white;
    }
    .platform-youtube { background: #ff0000; }
    .platform-instagram { background: #e1306c; }
    .platform-tiktok { background: #000000; }
    .platform-unknown { background: #9ca3af; }
    .detected .name { margin-top: 6px; font-weight: 500; font-size: 12px; }
    .detected .status-text { margin-top: 4px; color: #666; }
    .stats {
      margin-top: 10px;
      padding: 8px 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stats .label { font-size: 10px; color: #6b7280; }
    .stats .value { font-size: 16px; font-weight: 700; color: #6366f1; }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #e5e7eb;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">CP</div>
    <div class="header-text">
      <h1>CelePulse Import</h1>
      <p>静默数据采集</p>
    </div>
  </div>
  <div class="content">
    <div class="field">
      <label>CelePulse 后台地址</label>
      <input type="url" id="backendUrl" placeholder="http://localhost:30015" />
    </div>
    <button class="btn" id="saveBtn">保存设置</button>
    <div id="statusBar" class="status-bar"></div>

    <div id="detected" class="detected">
      <span class="platform-badge" id="platformBadge"></span>
      <div class="name" id="detectedName"></div>
      <div class="status-text" id="detectedStatus"></div>
    </div>

    <div class="stats">
      <div>
        <div class="label">今日已采集</div>
        <div class="value" id="todayCount">0</div>
      </div>
      <div style="text-align:right">
        <div class="label">总计采集</div>
        <div class="value" id="totalCount">0</div>
      </div>
    </div>

    <button class="btn btn-secondary" id="forceBtn" style="margin-top:10px; display:none;">
      强制重新采集当前页面
    </button>
  </div>
  <div class="footer">
    浏览频道页自动采集 · 无需操作
  </div>
  <script src="popup.js"></script>
</body>
</html>
